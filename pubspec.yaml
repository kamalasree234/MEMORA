name: memora
description: A beautiful notes application with lavender theme
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  share_plus: ^7.2.2
  http: ^1.2.0
  flutter_quill: ^11.5.0
  image_picker: ^1.0.7
  url_launcher: ^6.2.5
  flutter_colorpicker: ^1.0.3
  share_handler: ^0.0.19
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.4.10
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  shimmer: ^3.0.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/MEMORA.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#F3E8FF"
  adaptive_icon_foreground: "assets/MEMORA.jpg"

flutter:
  uses-material-design: true
  assets:
    - MEMORA.jpg
